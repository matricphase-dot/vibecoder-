<!DOCTYPE html>
<html>
<head>
    <title>VibeCoder Generation Test</title>
    <style>
        body { background: #0a0a0a; color: #e5e5e5; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 100px; background: #1e1e1e; color: white; border: 1px solid #333; }
        button { background: #1D4ED8; border: none; padding: 8px 16px; color: white; cursor: pointer; }
        pre { background: #1e1e1e; padding: 10px; overflow: auto; max-height: 500px; }
    </style>
</head>
<body>
    <h2>Generate via REST (bypass WebSocket)</h2>
    <textarea id="prompt" placeholder="e.g., Build a Rust CLI tool that reads CSV and outputs JSON">Build a Rust CLI tool that reads a CSV file and outputs JSON</textarea><br/>
    <button onclick="generate()">Generate</button>
    <pre id="output">Click Generate to see files...</pre>
    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            document.getElementById('output').innerText = 'Generating...';
            try {
                const res = await fetch('http://localhost:8000/test/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                if (data.files) {
                    let out = `Generated ${data.count} files:\n\n`;
                    for (const [path, content] of Object.entries(data.files)) {
                        out += `=== ${path} ===\n${content.substring(0, 500)}${content.length > 500 ? '\n... (truncated)' : ''}\n\n`;
                    }
                    document.getElementById('output').innerText = out;
                } else {
                    document.getElementById('output').innerText = 'Error: ' + JSON.stringify(data);
                }
            } catch(e) {
                document.getElementById('output').innerText = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
