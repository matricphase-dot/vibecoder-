[build]
  builder = "NIXPACKS"
  buildCommand = "cd backend && pip install -r requirements-cloud.txt"

[deploy]
  startCommand = "cd backend && uvicorn src.main:app --host 0.0.0.0 --port $PORT"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[environments.production.variables]
  PYTHONUNBUFFERED = "1"
  USE_OLLAMA = "false"
  DEEPSEEK_API_KEY = ""   # will be set in dashboard
  GROQ_API_KEY = ""       # will be set in dashboard
